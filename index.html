<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#eef3f5" />
    <title>&#1056;&#1045;&#1040;&#1051;</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <script>
      (() => {
        try {
          const saved = window.localStorage.getItem('grade-theme');
          const prefersDark =
            typeof window.matchMedia === 'function' && window.matchMedia('(prefers-color-scheme: dark)').matches;
          const mode = saved === 'light' || saved === 'dark' ? saved : prefersDark ? 'dark' : 'light';
          document.documentElement.classList.toggle('dark', mode === 'dark');
          document.documentElement.style.colorScheme = mode;
        } catch {
          // Ignore storage and media-query errors to keep startup resilient.
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api-maps.yandex.ru" crossorigin />
    <link rel="dns-prefetch" href="//api-maps.yandex.ru" />
    <link rel="dns-prefetch" href="//yastatic.net" />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&display=swap"
      />
    </noscript>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
