name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_YMAPS_API_KEY: ${{ secrets.VITE_YMAPS_API_KEY || secrets.MAPY || vars.VITE_YMAPS_API_KEY || vars.MAPY }}
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
          PAGES_BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          if [ -n "$CUSTOM_DOMAIN" ]; then
            echo "Custom domain detected, using root base path (/)."
            export VITE_BASE_PATH=/
          elif [ -n "$PAGES_BASE_URL" ]; then
            PAGE_HOST=$(node -e "try{process.stdout.write(new URL(process.env.PAGES_BASE_URL).hostname)}catch{process.stdout.write('')}")
            if [ -n "$PAGE_HOST" ] && [ "$PAGE_HOST" != "${PAGE_HOST#*.github.io}" ]; then
              echo "GitHub Pages host detected ($PAGE_HOST), using repository base path from vite.config.ts."
              unset VITE_BASE_PATH
            elif [ -n "$PAGE_HOST" ]; then
              echo "Non-github.io host detected ($PAGE_HOST), using root base path (/)."
              export VITE_BASE_PATH=/
            else
              echo "Could not parse pages host, using repository base path from vite.config.ts."
              unset VITE_BASE_PATH
            fi
          else
            echo "No custom domain set, using repository base path from vite.config.ts."
            unset VITE_BASE_PATH
          fi
          npm run build

      - name: Write CNAME (optional)
        if: ${{ vars.CUSTOM_DOMAIN != '' }}
        run: echo "${{ vars.CUSTOM_DOMAIN }}" > dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
